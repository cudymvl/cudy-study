<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cudy-study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     DESIGN TOKENS
  ============================================================ */
  :root {
    --bg-base:        #080b10;
    --bg-surface:     #0d1117;
    --bg-elevated:    #131924;
    --bg-card:        #111822;

    --accent-primary: #00e5c4;   /* teal-mint — distinctive, not purple */
    --accent-glow:    #00e5c480;
    --accent-warm:    #f0a050;   /* amber accent for contrast */
    --accent-cool:    #3b8beb;   /* cobalt for depth */

    --text-primary:   #eef2f8;
    --text-secondary: #8a95a8;
    --text-muted:     #4a5568;

    --border-subtle:  #1e2a38;
    --border-mid:     #253347;

    --radius-card:    16px;
    --radius-pill:    100px;

    --font-display: 'Sora', sans-serif;
    --font-body:    'Noto Sans KR', sans-serif;

    --glow-primary: 0 0 60px #00e5c425, 0 0 120px #00e5c410;
    --glow-card:    0 4px 32px #00000060, 0 0 0 1px #1e2a38;
    --glow-hover:   0 8px 48px #00000080, 0 0 0 1px #253347, 0 0 40px #00e5c415;
  }

  /* ============================================================
     RESET & BASE
  ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ============================================================
     CANVAS BACKGROUND — subtle animated aurora mesh
  ============================================================ */
  .bg-aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-aurora::before,
  .bg-aurora::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.06;
  }

  .bg-aurora::before {
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, var(--accent-primary) 0%, transparent 70%);
    top: -200px;
    left: -200px;
    animation: aurora-drift 18s ease-in-out infinite alternate;
  }

  .bg-aurora::after {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--accent-cool) 0%, transparent 70%);
    bottom: -150px;
    right: -150px;
    animation: aurora-drift 22s ease-in-out infinite alternate-reverse;
  }

  @keyframes aurora-drift {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(60px, 40px) scale(1.1); }
    100% { transform: translate(-40px, 80px) scale(0.95); }
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(var(--border-subtle) 1px, transparent 1px),
      linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
    background-size: 64px 64px;
    opacity: 0.3;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  /* ============================================================
     LAYOUT WRAPPER
  ============================================================ */
  .site-wrap {
    position: relative;
    z-index: 1;
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ============================================================
     NAV
  ============================================================ */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    background: rgba(8, 11, 16, 0.75);
    border-bottom: 1px solid var(--border-subtle);
  }

  .nav-inner {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-primary);
    box-shadow: 0 0 10px var(--accent-primary);
    animation: pulse-dot 3s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(0.75); }
  }

  .nav-badge {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-primary);
    background: rgba(0, 229, 196, 0.08);
    border: 1px solid rgba(0, 229, 196, 0.2);
    padding: 3px 10px;
    border-radius: var(--radius-pill);
  }

  /* ============================================================
     HERO
  ============================================================ */
  .hero {
    padding: 140px 0 80px;
    text-align: center;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-primary);
    background: rgba(0, 229, 196, 0.06);
    border: 1px solid rgba(0, 229, 196, 0.18);
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    margin-bottom: 32px;
    animation: fade-up 0.6s ease both;
  }

  .hero-eyebrow-icon {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-primary);
    box-shadow: 0 0 8px var(--accent-primary);
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.0;
    color: var(--text-primary);
    margin-bottom: 20px;
    animation: fade-up 0.6s 0.1s ease both;
  }

  .hero-title-accent {
    background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-cool) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-mission {
    font-family: var(--font-display);
    font-size: clamp(18px, 2.5vw, 26px);
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: -0.01em;
    margin-bottom: 16px;
    animation: fade-up 0.6s 0.2s ease both;
  }

  .hero-mission strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .hero-sub {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 520px;
    margin: 0 auto 48px;
    line-height: 1.7;
    animation: fade-up 0.6s 0.3s ease both;
  }

  .hero-stats {
    display: inline-flex;
    gap: 40px;
    align-items: center;
    animation: fade-up 0.6s 0.4s ease both;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-number {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.04em;
    color: var(--text-primary);
  }

  .stat-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .stat-divider {
    width: 1px;
    height: 36px;
    background: var(--border-mid);
  }

  /* Divider line after hero */
  .section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-mid), transparent);
    margin: 0 auto;
    max-width: 600px;
  }

  /* ============================================================
     FADE-UP ANIMATION
  ============================================================ */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ============================================================
     SECTION HEADER
  ============================================================ */
  .section-header {
    margin: 80px 0 48px;
  }

  .section-tag {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-primary);
    margin-bottom: 12px;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    margin-bottom: 12px;
  }

  .section-sub {
    font-size: 15px;
    color: var(--text-secondary);
    max-width: 480px;
    line-height: 1.65;
  }

  /* ============================================================
     SERIES CARDS
  ============================================================ */
  .series-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 120px;
  }

  .series-card {
    display: block;
    text-decoration: none;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-card);
    padding: 36px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--glow-card);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                border-color 0.3s ease;
  }

  .series-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 0% 0%, rgba(0, 229, 196, 0.05) 0%, transparent 70%);
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .series-card:nth-child(2)::before {
    background: radial-gradient(ellipse 60% 50% at 0% 0%, rgba(59, 139, 235, 0.06) 0%, transparent 70%);
  }

  .series-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--glow-hover);
    border-color: var(--border-mid);
  }

  .series-card:hover::before {
    opacity: 1.5;
  }

  .card-series-num {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent-primary);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .series-card:nth-child(2) .card-series-num {
    color: var(--accent-cool);
  }

  .card-series-num::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 1px;
    background: currentColor;
    opacity: 0.6;
  }

  .card-module-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    margin-bottom: 16px;
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 14px;
    transition: color 0.2s ease;
  }

  .series-card:hover .card-title {
    color: #ffffff;
  }

  .card-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .card-topics {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 28px;
  }

  .topic-tag {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-subtle);
    padding: 3px 9px;
    border-radius: var(--radius-pill);
    transition: color 0.2s, border-color 0.2s;
  }

  .series-card:hover .topic-tag {
    color: var(--text-secondary);
    border-color: var(--border-mid);
  }

  .card-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-primary);
    transition: gap 0.2s ease;
  }

  .series-card:nth-child(2) .card-cta {
    color: var(--accent-cool);
  }

  .series-card:hover .card-cta {
    gap: 14px;
  }

  .card-cta-arrow {
    font-size: 16px;
    transition: transform 0.2s ease;
  }

  .series-card:hover .card-cta-arrow {
    transform: translateX(4px);
  }

  /* Card large number decoration */
  .card-deco-number {
    position: absolute;
    top: 20px;
    right: 28px;
    font-family: var(--font-display);
    font-size: 80px;
    font-weight: 800;
    letter-spacing: -0.06em;
    color: rgba(255,255,255,0.025);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  /* ============================================================
     METHOD SECTION
  ============================================================ */
  .method-section {
    padding: 64px 0;
    border-top: 1px solid var(--border-subtle);
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 80px;
  }

  .method-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    margin-top: 48px;
    position: relative;
  }

  .method-grid::before {
    content: '';
    position: absolute;
    top: 28px;
    left: calc(10% + 20px);
    right: calc(10% + 20px);
    height: 1px;
    background: linear-gradient(90deg, var(--border-subtle), var(--border-mid), var(--border-subtle));
    z-index: 0;
  }

  .method-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
    position: relative;
    padding: 0 12px;
    z-index: 1;
  }

  .method-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--bg-elevated);
    border: 1px solid var(--border-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .method-step:hover .method-icon {
    border-color: var(--accent-primary);
    box-shadow: 0 0 20px rgba(0, 229, 196, 0.15);
  }

  .method-step-num {
    position: absolute;
    top: -8px;
    right: -4px;
    width: 18px;
    height: 18px;
    background: var(--accent-primary);
    color: var(--bg-base);
    border-radius: 50%;
    font-family: var(--font-display);
    font-size: 9px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .method-label {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.35;
  }

  .method-sub {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ============================================================
     FOOTER
  ============================================================ */
  footer {
    border-top: 1px solid var(--border-subtle);
    padding: 40px 0 48px;
  }

  .footer-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .footer-logo {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: -0.02em;
  }

  .footer-copy {
    font-size: 13px;
    color: var(--text-muted);
  }

  .footer-tag {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    padding: 4px 12px;
    border-radius: var(--radius-pill);
  }

  /* ============================================================
     RESPONSIVE
  ============================================================ */
  @media (max-width: 768px) {
    .series-grid {
      grid-template-columns: 1fr;
    }

    .method-grid {
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .method-grid::before {
      display: none;
    }

    .method-step {
      flex-direction: row;
      text-align: left;
      padding: 0;
    }

    .method-icon {
      flex-shrink: 0;
    }

    .hero-stats {
      gap: 24px;
    }

    .footer-inner {
      flex-direction: column;
      align-items: flex-start;
    }

    .series-card {
      padding: 28px;
    }

    /* nav: tighter on mobile */
    .nav-inner {
      padding: 0 16px;
      height: 52px;
    }

    /* hero: less top padding on tablet */
    .hero { padding: 100px 0 64px; }
  }

  @media (max-width: 480px) {
    .hero { padding: 72px 0 48px; }
    .hero-stats { flex-direction: column; gap: 16px; }
    .stat-divider { display: none; }

    /* nav: minimal padding on small phones, hide badge if it crowds */
    .nav-inner { padding: 0 12px; height: 48px; }
    .nav-logo { font-size: 15px; }
    .nav-badge { display: none; }

    /* site-wrap: tighter horizontal padding */
    .site-wrap { padding: 0 16px; }

    /* hero title: clamp already handles vw scaling, no change needed */
    /* hero sub: allow it to be full-width */
    .hero-sub { max-width: 100%; }

    /* section header: less top margin */
    .section-header { margin: 56px 0 36px; }

    /* series card: tighter padding */
    .series-card { padding: 22px; }

    /* method section: less padding */
    .method-section { padding: 48px 0; }
  }

  /* ============================================================
     PREFERS REDUCED MOTION
  ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    .bg-aurora::before,
    .bg-aurora::after,
    .nav-logo-dot,
    .hero-eyebrow,
    .hero-title,
    .hero-mission,
    .hero-sub,
    .hero-stats {
      animation: none;
    }

    .series-card,
    .series-card:hover,
    .card-cta,
    .series-card:hover .card-cta {
      transition: none;
      transform: none;
    }
  }
</style>
</head>

<body>

<!-- Background layer -->
<div class="bg-aurora" aria-hidden="true"></div>
<div class="bg-grid" aria-hidden="true"></div>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="#" class="nav-logo">
      <span class="nav-logo-dot" aria-hidden="true"></span>
      cudy-study
    </a>
    <span class="nav-badge">2 시리즈</span>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main>
  <div class="site-wrap">

    <!-- HERO -->
    <section class="hero" aria-label="히어로">
      <h1 class="hero-title">
        <span class="hero-title-accent">cudy</span>-study
      </h1>
    </section>

    <!-- SERIES LIST -->
    <section aria-label="학습 시리즈">
      <div class="series-grid">

        <!-- Card 1 -->
        <a href="openclaude/index.html" class="series-card" aria-label="SERIES 01 — openclaude로 배우는 에이전트 내부 원리">
          <span class="card-deco-number" aria-hidden="true">01</span>
          <p class="card-series-num">Series 01</p>
          <h3 class="card-title">openclaude로 배우는<br>에이전트 내부 원리</h3>
          <span class="card-cta">
            <span class="card-cta-arrow" aria-hidden="true">→</span>
          </span>
        </a>

        <!-- Card 2 -->
        <a href="superpowers/index.html" class="series-card" aria-label="SERIES 02 — superpowers로 배우는 에이전트 방법론">
          <span class="card-deco-number" aria-hidden="true">02</span>
          <p class="card-series-num">Series 02</p>
          <h3 class="card-title">superpowers로 배우는<br>에이전트 방법론</h3>
          <span class="card-cta">
            <span class="card-cta-arrow" aria-hidden="true">→</span>
          </span>
        </a>

      </div>
    </section>

  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="site-wrap">
    <div class="footer-inner">
      <span class="footer-logo">cudy-study</span>
    </div>
  </div>
</footer>

</body>
</html>
